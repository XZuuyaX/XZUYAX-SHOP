<!DOCTYPE html>
<html>

<head>

<title>

</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<div class="card">

<h1>
XZuyaX's HUB
</h1>

<p>
SHOP
</p>

<script>

const music =
document.getElementById(

);

function enter(){

window.location.href =
"store.html";

}
