<!DOCTYPE html>
<html>

<head>

    <title>XZuyaX HUB</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <audio id="music" autoplay loop>
        <source src="assets/music.mp3">
    </audio>

    <div class="card">

        <h1>
            XZuyaX's HUB
        </h1>

        <p>
            Premium Scripts & Services
        </p>

        <button onclick="enter()">
            Continue to Shop
        </button>

    </div>

    <div class="card discord-card">

        <h3>
            💬 Discord Community
        </h3>

        <p>
            Need support, updates, announcements,
            or want to contact us?
        </p>

        <button onclick="joinDiscord()">
            Join Discord Server
        </button>

    </div>

    <script>

        const music =
        document.getElementById(
            "music"
        );

        music.volume = 0.4;

        document.body.addEventListener(
            "click",
            () => {

                music.play();

            },
            {
                once: true
            }
        );

        function joinDiscord() {

            window.open(
                "https://discord.gg/X4H7phPu8P",
                "_blank"
            );

        }

        function enter() {

            window.location.href =
            "store.html";

        }

    </script>

</body>

</html>
