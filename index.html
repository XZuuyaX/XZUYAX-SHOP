<!DOCTYPE html>
<html>

<head>

    <title>XZuyaX HUB</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <audio id="music" autoplay loop>
        <source src="assets/music.mp3">
    </audio>

    <div class="card">

        <h1>
            XZuyaX's HUB
        </h1>

        <p class="subtitle">
            Premium Scripts & Services
        </p>

        <div class="support-box">

            <h3>
                Community & Support
            </h3>

            <p>
                Need assistance, updates, bug reports, or product support?
                Join our official Discord community and stay connected.
            </p>

            <button class="discord-btn" onclick="joinDiscord()">
                💬 Join Discord Server
            </button>

        </div>

        <button class="continue-btn" onclick="enter()">
            Continue to Shop
        </button>

    </div>

    <script>

        const music =
        document.getElementById(
            "music"
        );

        music.volume = 0.4;

        document.body.addEventListener(
            "click",
            () => {

                music.play();

            },
            {
                once: true
            }
        );

        function joinDiscord() {

            window.open(
                "https://discord.gg/X4H7phPu8P",
                "_blank"
            );

        }

        function enter() {

            window.location.href =
            "store.html";

        }

    </script>

</body>

</html>
