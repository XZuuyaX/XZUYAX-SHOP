<!DOCTYPE html>
<html>

<head>

<title>
XZuyaX HUB
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<div class="card">

<h1>
XZuyaX's HUB
</h1>

<p>
SHOP
</p>

<button onclick="enter()">
Click To Continue
</button>

</div>

<script>

const music =
document.getElementById(
"music"
);

music.volume = 0.4;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

function enter(){

window.location.href =
"store.html";

}

</script>

</body>
</html>
