<!DOCTYPE html>
<html>

<head>

<title>
XZuyaX HUB
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<div class="card">

<h1>
XZuyaX's HUB
</h1>

<p>
Premium Scripts & Services
</p>

<button onclick="enter()">
Continue to Shop
</button>

<p class="discord-help">

Need help? Join our Discord

<a
href="https://discord.gg/X4H7phPu8P"
target="_blank"
title="Join Discord">

<img
src="https://cdn.simpleicons.org/discord/FFFFFF"
alt="Discord"
class="discord-icon">

</a>

</p>

</div>

<script>

const music =
document.getElementById(
"music"
);

music.volume = 0.4;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

function enter(){

window.location.href =
"store.html";

}

</script>

</body>
</html>
