<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ZUYA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#050505;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* BACKGROUND */

.bg{
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2070&auto=format&fit=crop')
    center/cover no-repeat;

    transform:scale(1.1);
    filter:blur(8px);
}

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:.25;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* CARD */

.card{
    position:relative;
    width:360px;
    border-radius:28px;
    overflow:hidden;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45),
    0 0 80px rgba(88,101,242,.15);

    animation:cardIn .8s ease;
}

@keyframes cardIn{
    from{
        opacity:0;
        transform:translateY(30px) scale(.95);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.banner{
    height:140px;
    background:
    url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=2070&auto=format&fit=crop')
    center/cover;
}

.content{
    padding:75px 24px 24px;
    position:relative;
    text-align:center;
}

.avatar{
    position:absolute;
    width:105px;
    height:105px;
    border-radius:50%;
    object-fit:cover;

    left:50%;
    top:-52px;

    transform:translateX(-50%);

    border:5px solid #0b0b0b;

    box-shadow:
    0 0 30px rgba(88,101,242,.45);

    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 20px rgba(88,101,242,.3);
    }
    50%{
        box-shadow:0 0 45px rgba(88,101,242,.7);
    }
    100%{
        box-shadow:0 0 20px rgba(88,101,242,.3);
    }
}

h1{
    font-size:30px;
    font-weight:800;
    letter-spacing:.5px;
}

.tag{
    margin-top:5px;
    color:#b8b8b8;
    font-size:14px;
}

.badge{
    margin-top:14px;
    display:inline-flex;
    align-items:center;
    gap:7px;

    background:rgba(88,101,242,.15);
    border:1px solid rgba(88,101,242,.35);

    padding:8px 14px;
    border-radius:999px;

    font-size:13px;
    color:#d8ddff;
}

.desc{
    margin-top:20px;
    color:#d3d3d3;
    font-size:14px;
    line-height:1.7;
}

/* BUTTONS */

.btns{
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

button{
    border:none;
    outline:none;
    cursor:pointer;
    transition:.25s;
}

.btn{
    height:50px;
    border-radius:16px;

    font-weight:700;
    font-size:15px;
}

.discord{
    background:#5865F2;
    color:white;

    box-shadow:
    0 10px 25px rgba(88,101,242,.3);
}

.discord:hover{
    transform:translateY(-3px);
}

.copy{
    background:rgba(255,255,255,.07);
    color:white;
}

.copy:hover{
    background:rgba(255,255,255,.12);
}

.music{
    position:absolute;
    top:18px;
    right:18px;

    width:42px;
    height:42px;

    border-radius:50%;

    background:rgba(255,255,255,.08);
    color:white;

    font-size:16px;
}

.music:hover{
    background:rgba(255,255,255,.15);
}

.status{
    margin-top:18px;
    font-size:13px;
    color:#8dffae;
    display:none;
}

.footer{
    margin-top:22px;
    font-size:12px;
    color:#8f8f8f;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="particles" id="particles"></div>

<div class="card">

    <button class="music" onclick="toggleMusic()">
        ♫
    </button>

    <div class="banner"></div>

    <div class="content">

        <!-- FOTO PROFILE -->
        <img class="avatar"
        src="https://i.imgur.com/2DhmtJ4.jpeg">

        <!-- NAMA -->
        <h1>ZUYA</h1>

        <!-- USERNAME -->
        <div class="tag">@zuya</div>

        <div class="badge">
            ● Discord Contact
        </div>

        <div class="desc">
            Open my Discord profile instantly.<br>
            Your message template will be copied automatically.
        </div>

        <div class="btns">

            <button class="btn discord"
            onclick="openDiscord()">
                Open Discord DM
            </button>

            <button class="btn copy"
            onclick="copyMessage()">
                Copy Message
            </button>

        </div>

        <div class="status" id="status">
            Message copied successfully.
        </div>

        <div class="footer">
            github.io • made by zuya
        </div>

    </div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <!-- GANTI LINK MUSIC -->
    <source src="https://files.catbox.moe/6r0qfj.mp3" type="audio/mpeg">
</audio>

<script>

/* =========================
   DISCORD CONFIG
========================= */

// GANTI USER ID
const discordUser = "123456789012345678";

// TEMPLATE PESAN
const message =
`Halo bang, saya mau order.

Username:
Keperluan:
Payment:`;


/* =========================
   PARTICLES
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<50;i++){

    const span =
    document.createElement("span");

    span.style.left =
    Math.random()*100+"%";

    span.style.animationDuration =
    (Math.random()*10+8)+"s";

    span.style.animationDelay =
    Math.random()*5+"s";

    particles.appendChild(span);
}

/* =========================
   COPY MESSAGE
========================= */

async function copyMessage(){

    await navigator.clipboard
    .writeText(message);

    showStatus();
}

/* =========================
   OPEN DISCORD
========================= */

async function openDiscord(){

    await navigator.clipboard
    .writeText(message);

    showStatus();

    const isMobile =
    /Android|iPhone|iPad|iPod/i
    .test(navigator.userAgent);

    if(isMobile){

        window.location.href =
        `discord://-/users/${discordUser}`;

        setTimeout(()=>{
            window.location.href =
            `https://discord.com/users/${discordUser}`;
        },1000);

    }else{

        window.open(
            `https://discord.com/users/${discordUser}`,
            "_blank"
        );
    }
}

/* =========================
   STATUS
========================= */

function showStatus(){

    const status =
    document.getElementById("status");

    status.style.display = "block";

    setTimeout(()=>{
        status.style.display = "none";
    },2000);
}

/* =========================
   MUSIC
========================= */

const music =
document.getElementById("bgMusic");

let playing = false;

function toggleMusic(){

    if(!playing){

        music.volume = 0.5;
        music.play();

        playing = true;

    }else{

        music.pause();

        playing = false;
    }
}

/* AUTOPLAY TRY */

window.addEventListener("click",()=>{

    if(!playing){

        music.volume = 0.5;

        music.play()
        .then(()=>{
            playing = true;
        })
        .catch(()=>{});
    }

},{ once:true });

</script>

</body>
</html>
