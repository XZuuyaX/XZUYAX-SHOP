<!DOCTYPE html>
<html>

<head>

<title>QRIS Payment</title>

<link rel="stylesheet"
href="style.css">

</head>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<script>

const music =
document.getElementById(
"music"
);

music.volume = 0.5;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

</script>

<body>

<div class="payment-card">

<h1>
QRIS Payment
</h1>

<img src="assets/qris.png"
class="qr">

<p>
Upload payment proof below
</p>

<input type="file"
id="proof">

<button onclick="submitProof()">
Submit QRIS Receipt
</button>

</div>

<script>
async function submitProof(){

const file =
document.getElementById(
"proof"
).files[0];

if(!file){

alert(
"Upload receipt first"
);

return;

}

const formData =
new FormData();

formData.append(
"file",
file
);

formData.append(
"buyer",
"Anonymous"
);

formData.append(
"payment",
"QRIS"
);

await fetch(
"https://backend.sumiratcahayapermana.workers.dev/",
{
method:"POST",
body:formData
}
);

document.getElementById(
"popup"
).style.display =
"flex";

}

window.location.href =
"success.html";

}

</script>
  
<div class="popup"
id="popup">

<div class="popup-box">

<h2>
Payment Submitted
</h2>

<p>
Your payment proof has been sent successfully.
Please wait for verification.
</p>

<div class="popup-buttons">

<button onclick="home()">
Main Menu
</button>

<button onclick="closePopup()">
Close
</button>

</div>

</div>

</div>
  
</body>
</html>
