<script>

const music =
document.getElementById(
"music"
);

music.volume = 0.5;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

async function submitProof(){

const file =
document.getElementById(
"proof"
).files[0];

const discord =
document.getElementById(
"discord"
).value;

if(!discord){

alert(
"Enter Discord UserID"
);

return;

}

if(!file){

alert(
"Upload receipt first"
);

return;

}

const formData =
new FormData();

formData.append(
"file",
file
);

formData.append(
"buyer",
discord
);

formData.append(
"payment",
"QRIS"
);

try{

const response =
await fetch(
"https://backend.sumiratcahayapermana.workers.dev/",
{
method:"POST",
body:formData
}
);

const text =
await response.text();

console.log(text);

let result;

try{

result =
JSON.parse(text);

}catch{

alert(
"Invalid server response"
);

return;

}

if(result.success){

document.getElementById(
"popup"
).style.display =
"flex";

}else{

alert(
"Upload failed"
);

}

}catch(err){

console.log(err);

alert(
"Server Error"
);

}

}

function closePopup(){

document.getElementById(
"popup"
).style.display =
"none";

}

function home(){

window.location.href =
"index.html";

}

</script>
