<!DOCTYPE html>
<html>

<head>

<title>QRIS Payment</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<div class="payment-card">

<h1>
QRIS Payment
</h1>

<img src="assets/qris.png"
class="qr">

<p>
Upload your payment proof below
</p>

<input
type="text"
id="discord"
placeholder="Your Discord UserID">

<input
type="file"
id="proof">

<button onclick="submitProof()">
Submit QRIS Receipt
</button>

</div>

<div class="popup"
id="popup">

<div class="popup-box">

<h2>
Payment Submitted
</h2>

<p>
Your payment proof has been sent successfully.
Please wait for verification.
</p>

<div class="popup-buttons">

<button onclick="home()">
Main Menu
</button>

<button onclick="closePopup()">
Close
</button>

</div>

</div>

</div>

<script>

/* MUSIC */

const music =
document.getElementById(
"music"
);

music.volume = 0.5;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

/* PAYMENT */

async function submitProof(){

const file =
document.getElementById(
"proof"
).files[0];

const discord =
document.getElementById(
"discord"
).value;

if(!discord){

alert(
"Enter Discord UserID"
);

return;

}

if(!file){

alert(
"Upload receipt first"
);

return;

}

const formData =
new FormData();

formData.append(
"file",
file
);

formData.append(
"buyer",
discord
);

formData.append(
"payment",
"QRIS"
);

try{

const response =
await fetch(
"https://backend.sumiratcahayapermana.workers.dev/",
{
method:"POST",
body:formData
}
);

const result =
await response.json();

if(result.success){

document.getElementById(
"popup"
).style.display =
"flex";

}else{

alert(
"Failed to submit payment"
);

}

}catch(err){

console.log(err);

alert(
"Server Error"
);

}

}

/* POPUP */

function closePopup(){

document.getElementById(
"popup"
).style.display =
"none";

}

function home(){

window.location.href =
"index.html";

}

</script>

</body>
</html>
<div class="popup-box">

<h2>
Payment Submitted
</h2>

<p>
Your payment proof has been sent successfully.
Please wait for verification.
</p>

<div class="popup-buttons">

<button onclick="home()">
Main Menu
</button>

<button onclick="closePopup()">
Close
</button>

</div>

</div>

</div>
  
</body>
</html>
