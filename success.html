<!DOCTYPE html>
<html>

<head>

<title>
Success
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<div class="success-card">

<h1>
Payment Submitted
</h1>

<p>
Please wait for verification.
If needed, contact:
@the_readers
</p>

<button onclick="discord()">
Open Discord
</button>

<button onclick="home()">
Main Menu
</button>

</div>

<script>

const music =
document.getElementById(
"music"
);

music.volume = 0.4;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

function discord(){

window.open(
"https://discord.com/users/the_readers"
);

}

function home(){

window.location.href =
"index.html";

}

</script>

</body>
</html>
