<!DOCTYPE html>
<html>

<head>

<title>
Checkout
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<audio id="music" autoplay loop>
<source src="assets/music.mp3">
</audio>

<div class="card">

<h1>
Select Payment
</h1>

<p>
Choose your payment method
</p>

<button onclick="qris()">
QRIS
</button>

<button onclick="paypal()">
PayPal
</button>

</div>

<script>

const music =
document.getElementById(
"music"
);

music.volume = 0.4;

document.body.addEventListener(
"click",
()=>{

music.play();

},
{once:true}
);

function qris(){

window.location.href =
"payment.html";

}

function paypal(){

window.location.href =
"paypal.html";

}

</script>

</body>
</html>
